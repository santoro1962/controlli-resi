// ── GOOGLE SHEETS API LAYER ──
const API = {
  getUrl: () => localStorage.getItem("gsheet-url") || "",
  setUrl: (url) => localStorage.setItem("gsheet-url", url),
  
  async fetchAll() {
    const url = this.getUrl();
    if (!url) return null;
    const res = await fetch(url + "?action=getAll");
    const json = await res.json();
    return json.data || [];
  },
  
  async addResi(entry, fotoBase64) {
    const url = this.getUrl();
    if (!url) return { success: false, error: "URL non configurato" };
    // 1. Salva i resi
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "addResi", ...entry })
    });
    const json = await res.json();
    
    // 2. Upload foto se presente
    if (json.success && fotoBase64) {
      try {
        await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "uploadFoto", data: entry.data, operatore: entry.operatore, foto: fotoBase64 })
        });
      } catch(e) { console.log("Foto upload failed:", e); }
    }
    return json;
  },
  
  async updateDDT(data, ddt) {
    const url = this.getUrl();
    if (!url) return { success: false };
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "updateDDT", data, ddt })
    });
    return await res.json();
  }
};

    <ResponsiveContainer width="100%" height={160}><ComposedChart data={cd} margin={{top:5,right:8,left:-12,bottom:0}}>
      <defs><linearGradient id={`g-${giroKey}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity={0.2}/><stop offset="100%" stopColor={color} stopOpacity={0.01}/></linearGradient></defs>
      <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/><XAxis dataKey="date" tick={{fill:C.muted,fontSize:9,fontFamily:"monospace"}} interval={Math.floor(cd.length/7)}/><YAxis tick={{fill:C.muted,fontSize:9,fontFamily:"monospace"}}/>
      <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:12}} formatter={(v,n)=>[v!=null?`${v} kg`:"—",n==="value"?label:"Media 7gg"]}/>
      <ReferenceLine y={s.mean} stroke={C.muted} strokeDasharray="2 4" strokeOpacity={0.3}/>
      <Area type="monotone" dataKey="value" fill={`url(#g-${giroKey})`} stroke="none"/><Line type="monotone" dataKey="value" stroke={color} strokeWidth={2} dot={false}/><Line type="monotone" dataKey="value" stroke="none" dot={<Dot/>}/><Line type="monotone" dataKey="ma" stroke={C.ma} strokeWidth={1.5} strokeDasharray="5 3" dot={false}/>
    </ComposedChart></ResponsiveContainer></div>);
};

const DiffChart = ({ data }) => {
  const cd = useMemo(() => data.map(d => ({date:fmtDate(d.data),ammanco:d.differenza!=null&&d.differenza<0?d.differenza:null,ok:d.differenza!=null&&d.differenza>=0?d.differenza:null})), [data]);
  return (<div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,padding:"16px 12px 8px",marginBottom:14}}>
    <span style={{fontWeight:700,fontSize:14,padding:"0 6px"}}>⚖️ DDT vs Pesata</span>
    <div style={{fontSize:11,color:C.muted,padding:"4px 6px 10px"}}>🔴 ammanco · 🟢 OK</div>
    <ResponsiveContainer width="100%" height={180}><BarChart data={cd} margin={{top:5,right:8,left:-12,bottom:0}}>
      <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/><XAxis dataKey="date" tick={{fill:C.muted,fontSize:9,fontFamily:"monospace"}} interval={Math.floor(cd.length/8)}/><YAxis tick={{fill:C.muted,fontSize:9,fontFamily:"monospace"}}/>
      <Tooltip contentStyle={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,fontSize:12}} formatter={(v,n)=>n==="ammanco"?[`${v?.toFixed(2)} kg`,"⚠ AMMANCO"]:[`+${v?.toFixed(2)} kg`,"✓ OK"]}/>
      <ReferenceLine y={0} stroke={C.muted} strokeWidth={2}/><Bar dataKey="ok" fill={C.ok} radius={[3,3,0,0]} maxBarSize={10}/><Bar dataKey="ammanco" fill={C.danger} radius={[0,0,3,3]} maxBarSize={10}/>
    </BarChart></ResponsiveContainer></div>);
};

// ── MAIN ──
function Dashboard() {
  const [cloudData, setCloudData] = useState([]);
  const [localEntries] = useState(() => INITIAL_DATA.map(parseRow));
  const [form, setForm] = useState({ operatore:"", data:"", avellino:"", sergio:"", giovanni:"" });
  const [foto, setFoto] = useState(null);
  const [view, setView] = useState("60");
  const [showForm, setShowForm] = useState(false);
  const [tab, setTab] = useState("table");
  const [editingDate, setEditingDate] = useState(null);
  const [ddtInput, setDdtInput] = useState("");
  const [viewingPhoto, setViewingPhoto] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [connected, setConnected] = useState(!!API.getUrl());
  const [showSettings, setShowSettings] = useState(false);
  const [scriptUrl, setScriptUrl] = useState(API.getUrl());
  const [toast, setToast] = useState("");
  const fileRef = useRef(null);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 3000); };

  // Sync with Google Sheets on load
  const syncData = useCallback(async () => {
    if (!API.getUrl()) return;
    setSyncing(true);
    try {
      const data = await API.fetchAll();
      if (data) { setCloudData(data); setConnected(true); showToast("✓ Sincronizzato con Google Sheets"); }
    } catch(e) { console.log("Sync failed:", e); setConnected(false); showToast("⚠ Offline — dati locali"); }
    setSyncing(false);
  }, []);

  useEffect(() => { syncData(); }, [syncData]);

  // Merge local + cloud data
  const allData = useMemo(() => {
    const map = new Map();
    localEntries.forEach(d => map.set(d.data, d));
    cloudData.forEach(d => map.set(d.data, d)); // cloud overwrites local
    return [...map.values()].sort((a,b) => a.data.localeCompare(b.data));
  }, [localEntries, cloudData]);

  const filtered = useMemo(() => { const n = view === "all" ? allData.length : parseInt(view); return allData.slice(-n); }, [allData, view]);
  const pesataCalc = useMemo(() => { const a=parseFloat(form.avellino)||0,s=parseFloat(form.sergio)||0,g=parseFloat(form.giovanni)||0; return (a||s||g)?+(a+s+g).toFixed(2):null; }, [form.avellino,form.sergio,form.giovanni]);
  const pendingDDT = useMemo(() => allData.filter(e => e.ddt == null && e.pesata != null && e.pesata > 0 && cloudData.some(c => c.data === e.data)), [allData, cloudData]);

  const handlePhoto = useCallback(async (e) => { const f=e.target.files?.[0]; if(!f) return; setFoto(await resizeImage(f,800)); }, []);
  const canSave = form.data && form.operatore && pesataCalc && foto;

  const handleAdd = useCallback(async () => {
    if (!canSave) return;
    setSyncing(true);
    const entry = { data:form.data, operatore:form.operatore, avellino:form.avellino?+form.avellino:null, sergio:form.sergio?+form.sergio:null, giovanni:form.giovanni?+form.giovanni:null, pesata:pesataCalc };
    try {
      const res = await API.addResi(entry, foto);
      if (res.success) { showToast("✓ Salvato su Google Sheets + foto"); await syncData(); }
      else { showToast("⚠ Errore: " + (res.error || "sconosciuto")); }
    } catch(e) { showToast("⚠ Offline — riprova dopo"); }
    setForm({ operatore:form.operatore, data:"", avellino:"", sergio:"", giovanni:"" });
    setFoto(null); setShowForm(false); setSyncing(false);
    if (fileRef.current) fileRef.current.value = "";
  }, [form, pesataCalc, foto, canSave, syncData]);

  const handleSaveDDT = useCallback(async () => {
    if (!editingDate || !ddtInput) return;
    setSyncing(true);
    try {
      const res = await API.updateDDT(editingDate, parseFloat(ddtInput));
      if (res.success) { showToast("✓ DDT salvato"); await syncData(); }
      else { showToast("⚠ Errore: " + (res.error || "")); }
    } catch(e) { showToast("⚠ Offline — riprova"); }
    setEditingDate(null); setDdtInput(""); setSyncing(false);
  }, [editingDate, ddtInput, syncData]);

  const handleSaveSettings = () => {
    API.setUrl(scriptUrl.trim());
    setConnected(!!scriptUrl.trim());
    setShowSettings(false);
    if (scriptUrl.trim()) syncData();
    else showToast("URL rimosso — modalità offline");
  };

  const last = allData[allData.length - 1];
  const isAmm = last?.differenza != null && last.differenza < 0;
  const iStyle = { background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"12px 14px",color:C.text,fontFamily:"monospace",fontSize:16,outline:"none",width:"100%",boxSizing:"border-box" };

  return (
    <div style={{ background:C.bg, minHeight:"100vh", color:C.text, padding:"16px 12px 80px", fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" }}>
      <PhotoModal src={viewingPhoto} onClose={() => setViewingPhoto(null)} />
      <Toast msg={toast} />

      {/* HEADER */}
      <div style={{ maxWidth:920, margin:"0 auto 14px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#ef4444)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22 }}>🍞</div>
            <div>
              <h1 style={{ margin:0,fontSize:20,fontWeight:700 }}>Controlli Resi</h1>
              <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:12, color:C.muted }}>
                <span className="sync-dot" style={{ background: connected ? C.ok : C.danger }}/>
                {connected ? "Google Sheets" : "Offline"} · {allData.length} record
                {syncing && <span className="spinner" style={{ marginLeft:4 }}/>}
              </div>
            </div>
          </div>
          <button onClick={() => setShowSettings(!showSettings)} style={{ background:C.inBg, border:`1px solid ${C.inBord}`, borderRadius:10, padding:"10px 14px", cursor:"pointer", fontSize:18 }}>⚙️</button>
        </div>
      </div>

      <div style={{ maxWidth:920, margin:"0 auto" }}>
        {/* SETTINGS */}
        {showSettings && (
          <div style={{ background:C.card, borderRadius:14, border:`1px solid ${C.accent}33`, padding:18, marginBottom:14 }}>
            <div style={{ fontWeight:700, fontSize:15, marginBottom:10 }}>⚙️ Configurazione Google Sheets</div>
            <p style={{ fontSize:12, color:C.muted, marginBottom:12, lineHeight:1.6 }}>
              Incolla qui l'URL del Google Apps Script (quello che finisce con /exec).
              Tutti i dati verranno salvati e letti dal foglio Google.
            </p>
            <input type="url" placeholder="https://script.google.com/macros/s/.../exec" value={scriptUrl} onChange={e => setScriptUrl(e.target.value)} style={{...iStyle, fontSize:14, marginBottom:10}}/>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={handleSaveSettings} style={{ background:"linear-gradient(135deg,#10b981,#059669)", color:"#fff", border:"none", borderRadius:8, padding:"12px 24px", fontWeight:600, fontSize:14, cursor:"pointer", flex:1 }}>✓ Salva</button>
              <button onClick={() => { syncData(); setShowSettings(false); }} style={{ background:C.inBg, color:C.muted, border:`1px solid ${C.inBord}`, borderRadius:8, padding:"12px 16px", fontSize:14, cursor:"pointer" }}>🔄 Sync</button>
            </div>
          </div>
        )}

        {/* NO URL WARNING */}
        {!connected && !showSettings && (
          <div style={{ background:"rgba(239,68,68,0.06)", border:`1px solid ${C.danger}33`, borderRadius:12, padding:"14px 16px", marginBottom:12, fontSize:13 }}>
            <strong style={{ color:C.danger }}>⚠ Google Sheets non configurato</strong>
            <p style={{ color:C.muted, marginTop:4, fontSize:12 }}>Tocca ⚙️ per collegare il foglio Google. Senza, i dati non verranno salvati.</p>
          </div>
        )}

        {/* STAT CARDS */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(100px, 1fr))", gap:8, marginBottom:14 }}>
          {[
            { l:"Ultimo", v:last?fmtDate(last.data):"—" },
            { l:"Op.", v:last?.operatore||"—", c:last?.operatore==="Carmela"?C.carmela:C.antonio },
            { l:"Av.", v:last?fmt(last.avellino):"—", c:C.avellino },
            { l:"Sr.", v:last?fmt(last.sergio):"—", c:C.sergio },
            { l:"Gv.", v:last?fmt(last.giovanni):"—", c:C.giovanni },
            { l:isAmm?"⚠":"✓", v:last?fmt(last.differenza):"—", c:isAmm?C.danger:C.ok },
          ].map((x,i) => (
            <div key={i} style={{background:C.card,borderRadius:10,border:`1px solid ${C.border}`,padding:"8px 10px"}}>
              <div style={{fontSize:9,color:C.muted,fontWeight:500,marginBottom:2}}>{x.l}</div>
              <div style={{fontSize:14,fontWeight:700,fontFamily:"monospace",color:x.c||C.text}}>{x.v}</div>
            </div>
          ))}
        </div>

        {/* PENDING DDT */}
        {pendingDDT.length > 0 && !showForm && (
          <div style={{background:C.warnBg,border:`1px solid ${C.warn}33`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontWeight:700,marginBottom:10,fontSize:14}}>📋 {pendingDDT.length} in attesa DDT</div>
            {pendingDDT.map(e => {
              const isEd = editingDate === e.data;
              const dp = ddtInput && isEd ? +((e.pesata??0)-parseFloat(ddtInput)).toFixed(2) : null;
              return (<div key={e.data} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <span style={{fontFamily:"monospace",fontSize:15,fontWeight:700}}>{fmtDate(e.data)} — {e.pesata} kg</span>
                  {!isEd && <button onClick={()=>{setEditingDate(e.data);setDdtInput("");}} style={{background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#000",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,fontSize:14,cursor:"pointer"}}>✏️ DDT</button>}
                </div>
                {isEd && (<div style={{marginTop:12,display:"flex",flexDirection:"column",gap:10}}>
                  <input type="number" step="0.01" placeholder="DDT (kg)" value={ddtInput} onChange={ev=>setDdtInput(ev.target.value)} style={iStyle} autoFocus/>
                  {dp!=null && <span style={{fontFamily:"monospace",fontSize:15,fontWeight:700}}>{dp<0?"🔴":"🟢"} Diff: <span style={{color:dp<0?C.danger:C.ok}}>{dp} kg</span></span>}
                  <button onClick={handleSaveDDT} disabled={!ddtInput||syncing} style={{background:ddtInput?"linear-gradient(135deg,#10b981,#059669)":C.inBg,color:"#fff",border:"none",borderRadius:8,padding:"14px",fontWeight:600,fontSize:16,cursor:ddtInput?"pointer":"not-allowed",opacity:ddtInput?1:0.4}}>
                    {syncing ? "Salvataggio..." : "✓ Salva DDT"}
                  </button>
                </div>)}
              </div>);
            })}
          </div>
        )}

        {/* ADD ENTRY */}
        {pendingDDT.length === 0 && connected && (
          <button onClick={()=>setShowForm(!showForm)} style={{background:showForm?C.inBg:"linear-gradient(135deg,#f59e0b,#ef4444)",color:C.text,border:"none",borderRadius:12,padding:"14px 24px",fontWeight:600,fontSize:15,cursor:"pointer",width:"100%",marginBottom:14}}>{showForm?"✕ Chiudi":"+ Inserisci resi"}</button>
        )}

        {showForm && (
          <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.accent}33`,padding:18,marginBottom:14,boxShadow:"0 4px 24px rgba(139,92,246,0.08)"}}>
            <div style={{marginBottom:form.operatore?14:0}}>
              <label style={{fontSize:12,color:C.muted,marginBottom:6,fontWeight:500,display:"block"}}>Operatore</label>
              <div style={{display:"flex",gap:8}}>
                {["Carmela","Antonio"].map(op => (
                  <button key={op} onClick={()=>setForm({...form,operatore:op})} style={{
                    background:form.operatore===op?(op==="Carmela"?`linear-gradient(135deg,${C.carmela},#db2777)`:`linear-gradient(135deg,${C.antonio},#2563eb)`):C.inBg,
                    color:form.operatore===op?"#fff":C.muted,border:`1px solid ${form.operatore===op?"transparent":C.inBord}`,borderRadius:10,padding:"12px 20px",fontWeight:600,fontSize:15,cursor:"pointer",flex:1,
                  }}>{op==="Carmela"?"👩":"👨"} {op}</button>
                ))}
              </div>
            </div>
            {form.operatore && (<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{gridColumn:"1/-1"}}><label style={{fontSize:12,color:C.muted,marginBottom:3,fontWeight:500,display:"block"}}>Data</label><input type="date" value={form.data} onChange={e=>setForm({...form,data:e.target.value})} style={iStyle}/></div>
                <div><label style={{fontSize:12,color:C.muted,marginBottom:3,fontWeight:500,display:"block"}}>Avellino</label><input type="number" step="0.01" placeholder="0.00" value={form.avellino} onChange={e=>setForm({...form,avellino:e.target.value})} style={iStyle}/></div>
                <div><label style={{fontSize:12,color:C.muted,marginBottom:3,fontWeight:500,display:"block"}}>Sergio</label><input type="number" step="0.01" placeholder="0.00" value={form.sergio} onChange={e=>setForm({...form,sergio:e.target.value})} style={iStyle}/></div>
                <div><label style={{fontSize:12,color:C.muted,marginBottom:3,fontWeight:500,display:"block"}}>Giovanni</label><input type="number" step="0.01" placeholder="0.00" value={form.giovanni} onChange={e=>setForm({...form,giovanni:e.target.value})} style={iStyle}/></div>
                <div style={{display:"flex",flexDirection:"column",justifyContent:"center"}}><span style={{fontSize:11,color:C.muted}}>Pesata</span><span style={{fontFamily:"monospace",fontSize:20,fontWeight:700}}>{pesataCalc?`${pesataCalc} kg`:"—"}</span></div>
              </div>
              {/* CAMERA */}
              <div style={{marginTop:16,background:foto?C.okBg:"rgba(239,68,68,0.06)",border:`1px solid ${foto?C.ok+"33":C.danger+"33"}`,borderRadius:12,padding:14,textAlign:"center"}}>
                <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}} id="cam"/>
                {!foto?(<>
                  <div style={{fontSize:40,marginBottom:8}}>📸</div>
                  <p style={{fontSize:14,fontWeight:600,color:C.danger,marginBottom:10}}>Foto bilancia OBBLIGATORIA</p>
                  <button onClick={()=>fileRef.current?.click()} style={{background:"linear-gradient(135deg,#3b82f6,#2563eb)",color:"#fff",border:"none",borderRadius:10,padding:"14px 28px",fontWeight:700,fontSize:16,cursor:"pointer",width:"100%"}}>📷 Scatta foto</button>
                </>):(<>
                  <img src={foto} alt="Foto" style={{width:"100%",maxWidth:300,borderRadius:10}} onClick={()=>setViewingPhoto(foto)}/>
                  <p style={{fontSize:12,color:C.ok,fontWeight:600,marginTop:8}}>✓ Foto acquisita</p>
                  <button onClick={()=>{setFoto(null);if(fileRef.current)fileRef.current.value="";}} style={{background:"transparent",color:C.muted,border:`1px solid ${C.inBord}`,borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer",marginTop:6}}>🔄 Riscatta</button>
                </>)}
              </div>
              <button onClick={handleAdd} disabled={!canSave||syncing} style={{background:canSave?"linear-gradient(135deg,#10b981,#059669)":C.inBg,color:C.text,border:"none",borderRadius:12,padding:"14px 28px",marginTop:14,fontWeight:700,fontSize:16,cursor:canSave?"pointer":"not-allowed",opacity:canSave?1:0.4,width:"100%"}}>
                {syncing?"⏳ Salvataggio...":(canSave?"✓ Salva resi":"📸 Compila tutto + foto")}
              </button>
            </>)}
          </div>
        )}

        {/* TABS */}
        <div style={{display:"flex",gap:5,marginBottom:12}}>
          {[["table","📋 Tabella"],["charts","📈 Grafici"],["diff","⚖️ DDT"],["days","📊 Giorni"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{background:tab===k?C.accent:C.inBg,color:tab===k?"#fff":C.muted,border:`1px solid ${tab===k?C.accent:C.inBord}`,borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:500,cursor:"pointer",flex:1}}>{l}</button>
          ))}
        </div>

        {tab !== "table" && (
          <div style={{display:"flex",gap:5,marginBottom:14}}>
            {[["30","30gg"],["60","60gg"],["90","90gg"],["all","Tutti"]].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{background:view===v?"#334155":"transparent",color:view===v?C.text:C.muted,border:"1px solid #334155",borderRadius:6,padding:"4px 12px",fontSize:12,cursor:"pointer"}}>{l}</button>
            ))}
          </div>
        )}

        {tab==="charts"&&<><GiroChart data={filtered} giroKey="avellino" label="Avellino" color={C.avellino}/><GiroChart data={filtered} giroKey="sergio" label="Sergio" color={C.sergio}/><GiroChart data={filtered} giroKey="giovanni" label="Giovanni" color={C.giovanni}/></>}
        {tab==="diff"&&<DiffChart data={filtered}/>}
        {tab==="days"&&<div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,padding:"16px 12px 8px",marginBottom:14}}><span style={{fontWeight:700,fontSize:14,padding:"0 6px"}}>📊 Analisi per giorno</span><p style={{fontSize:11,color:C.muted,margin:"4px 0 12px 6px"}}>Reso giorno X = pane consegnato il giorno prima</p></div>}
        {tab==="table"&&(
          <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
            <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,fontSize:14}}>Dati ({allData.length})</span>
              <button onClick={syncData} disabled={syncing} style={{background:C.inBg,border:`1px solid ${C.inBord}`,borderRadius:8,padding:"6px 12px",fontSize:12,color:C.muted,cursor:"pointer"}}>
                {syncing?<span className="spinner"/>:"🔄"} Aggiorna
              </button>
            </div>
            <div style={{overflowX:"auto",maxHeight:500,overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"monospace",fontSize:11}}>
                <thead><tr style={{background:"#1e293b",position:"sticky",top:0,zIndex:1}}>
                  {["Data","Op.","Av.","Sr.","Gv.","Pesata","DDT","Diff.",""].map(h=>(
                    <th key={h} style={{padding:"8px 6px",textAlign:"right",fontWeight:600,color:C.muted,fontSize:9}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>{allData.slice().reverse().slice(0,100).map((d,i)=>{
                  const amm=d.differenza!=null&&d.differenza<0;
                  const noDDT=d.ddt==null&&d.pesata>0;
                  return(<tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:noDDT?"rgba(245,158,11,0.04)":amm?"rgba(239,68,68,0.03)":"transparent"}}>
                    <td style={{padding:"6px",textAlign:"right",fontWeight:500,fontSize:10}}>{fmtDate(d.data)}</td>
                    <td style={{padding:"6px",textAlign:"center",fontSize:9,color:d.operatore==="Carmela"?C.carmela:d.operatore==="Antonio"?C.antonio:C.muted}}>{d.operatore?d.operatore[0]:"—"}</td>
                    <td style={{padding:"6px",textAlign:"right",color:C.avellino,fontSize:10}}>{fmt(d.avellino)}</td>
                    <td style={{padding:"6px",textAlign:"right",color:C.sergio,fontSize:10}}>{fmt(d.sergio)}</td>
                    <td style={{padding:"6px",textAlign:"right",color:C.giovanni,fontSize:10}}>{fmt(d.giovanni)}</td>
                    <td style={{padding:"6px",textAlign:"right",color:C.muted,fontSize:10}}>{fmt(d.pesata)}</td>
                    <td style={{padding:"6px",textAlign:"right",fontSize:10}}>{noDDT?<span style={{color:C.warn,fontSize:9}}>⏳</span>:<span style={{color:C.muted}}>{fmt(d.ddt)}</span>}</td>
                    <td style={{padding:"6px",textAlign:"right",fontWeight:600,color:noDDT?C.muted:(amm?C.danger:C.ok),fontSize:10}}>{noDDT?"—":fmt(d.differenza)}</td>
                    <td style={{padding:"6px",textAlign:"center"}}>{noDDT?<span style={{color:C.warn,fontSize:9}}>⏳</span>:amm?<span style={{color:C.danger,fontSize:9}}>⚠</span>:<span style={{color:C.ok,fontSize:9}}>✓</span>}</td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
